<div id="header"></div>

<div class="general-text">Pentru a face o rezervare, vă rugăm să completați formularul de mai jos: </div>

<div class="container shadow-sm p-3 mb-5 bg-light rounded">
    <div class="row">
        <form method="post">
        <div class="col-sm form-border">
                <div class="mb-3">
                    <label for="last-name" class="form-label">Nume</label>
                    <input type="text" name="last-name" class="form-control" id="last-name">
                </div>
                <div class="mb-3">
                    <label for="first-name" class="form-label">Prenume</label>
                    <input type="text" name="first-name" class="form-control" id="first-name">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Numar de telefon</label>
                    <input type="text" name="phone" class="form-control" id="phone" placeholder="+407XXXXXXXX">
                </div>
                <div class="mb-3">
                    <label for="date">Data rezervării:</label>
                    <input required type="date" name="date" id="date" class="form-control" />
                </div>
                <div class="mb-3">
                    <label for="time">Ora rezervării:</label>
                    <input required type="time" name="time" id="time" class="form-control" min="09:00" max="21:00" />
                    <small><i>Rezervările pot fi făcute doar pentru intervalul orar 09:00 - 21:00.</i></small>
                </div>
        </div>
        <div class="col-sm">
                <div class="mb-3">
                    <label for="persons" class="form-label">Numar persoane</label>
                    <input type="number" name="persons" class="form-control" id="persons" max="12" required>
                    <small><i>Capacitatea noastră nu permite rezervări pentru mai mult de 12 persoane.</i></small>
                </div>
                <div class="mb-3">
                    <label for="description">Mesaj:</label>
                    <textarea required name="description" id="description" class="form-control" rows="9"
                        placeholder="Lăsați-ne aici preferințele dumneavoastră..."></textarea>
                </div>
                <div>
                    <button type="submit" name="send" class="btn btn-danger">Trimite</button>
                </div>
        </div>
        </form>
    </div>
</div>



<div id="footer"></div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
    $(function () {
        $("#header").load("header.html");
        $("#footer").load("footer.html");
    });
</script>
